version: '3.8'

services:
  # Option A: Oracle XE (matches legacy database)
  oracle-xe:
    image: gvenzl/oracle-xe:21-slim
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:-oracle}
      APP_USER: hrms
      APP_USER_PASSWORD: ${HRMS_DB_PASSWORD:-hrms}
    volumes:
      - oracle-data:/opt/oracle/oradata
    profiles:
      - oracle

  # Option B: PostgreSQL (target database)
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: hrmsdb
      POSTGRES_USER: hrms
      POSTGRES_PASSWORD: ${HRMS_DB_PASSWORD:-hrms}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    profiles:
      - postgres

volumes:
  oracle-data:
  postgres-data:
