spring:
  application:
    name: hrms-modernized

  # Database - Oracle (legacy, Phase 1)
  datasource:
    url: jdbc:oracle:thin:@localhost:1521/HRMSDB
    username: ${HRMS_DB_USER:hrms}
    password: ${HRMS_DB_PASSWORD:}
    driver-class-name: oracle.jdbc.OracleDriver

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate  # Schema managed by Flyway
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: HRMS

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas:
      - HRMS

  # Batch (payroll processing)
  batch:
    jdbc:
      initialize-schema: always

# Security
jwt:
  secret: ${JWT_SECRET:change-me-in-production}
  expiration-ms: 1800000  # 30 minutes (matches legacy SESSION_TIMEOUT_MIN)

# API Documentation
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

---
# Test profile - uses H2
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:hrmstest
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
